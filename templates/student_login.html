<!DOCTYPE html>
<html>

<head>
    <title>Student Login</title>
</head>

<body>

<h1>Student Login</h1>

<form action="/student-auth" method="POST">

    <input type="text"
           name="rollno"
           placeholder="Roll Number"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
