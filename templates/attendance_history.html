<!DOCTYPE html>
<html>

<head>

    <title>Attendance History</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            text-align:center;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#1e1e2f;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            text-align:center;
            border:1px solid #ddd;
        }

        tr:nth-child(even){
            background:#f9f9f9;
        }

        .btn{
            background:#007bff;
            color:white;
            padding:10px 15px;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<h1>Attendance History 📅</h1>

<br>

<a href="/attendance" class="btn">
    ← Back To Attendance
</a>

<br><br>

<table>

    <tr>
        <th>Date</th>
        <th>Student Name</th>
        <th>Roll No</th>
        <th>Status</th>
    </tr>

    {% for row in records %}

    <tr>

        <td>{{ row[0] }}</td>

        <td>{{ row[1] }}</td>

        <td>{{ row[2] }}</td>

        <td>{{ row[3] }}</td>

    </tr>

    {% endfor %}

</table>

</body>

</html>
