<!DOCTYPE html>
<html>

<head>
    <title>Change Password</title>
</head>

<body>

    <h1>Change Password 🔐</h1>

    <form action="/update-password" method="POST">

        <input
            type="password"
            name="current_password"
            placeholder="Current Password"
            required>

        <br><br>

        <input
            type="password"
            name="new_password"
            placeholder="New Password"
            required>

        <br><br>

        <button type="submit">
            Update Password
        </button>

    </form>

</body>

</html>
